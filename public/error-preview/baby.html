<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>에러 6종 — 우리 아기 관상</title>
<link rel="stylesheet" href="./_style.css?v=5">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
</head>
<body>
<h1>🍼 우리 아기 관상 — 에러 6종</h1>
<div class="sub">정식 이름 (page.tsx errMap)</div>
<a href="./index.html" class="nav-back">← 미리보기 목록으로</a>

<div id="root"></div>

<script>
const BRAND = "🔮 천기(天機) 오리지널 | 우리 아기 관상 리포트";
const HASHTAGS_BASE = "#천기관상 #우리아기관상";
const ERRORS = [
  {id:21, label:"동물 (NON_BABY)", name:'🐾 "나도 아기예요!" 멍냥이', quote:"이건 사람이 아닌 것 같아요!",
   detail:"우리 아기 사진을 올려줘야 해요! 만약 댕댕이·냥이라면 댕댕상·냥냥상으로 가주세요. 사랑스러운 우리 아기 얼굴 정면 사진으로 다시 올려주면 천기 AI가 정밀 분석해드릴게요! 🍼",
   guide:["우리 아기 얼굴 정면 사진","동물은 댕댕상·냥냥상에서!"], tag:"#멍냥이"},
  {id:22, label:"흐릿함 (BLURRY)", name:'🌫️ "안개 속 아기" 흐릿이', quote:"사진이 너무 어둡거나 흐려요!",
   detail:"아기들은 가만히 안 있죠~ 사진이 흔들렸거나 초점이 안 맞아서 천기 AI가 이목구비를 못 잡았어요. 자고 있을 때나 우유 먹는 평온한 순간 정면 사진으로 다시 올려주시면, 우리 아기의 타고난 재능과 미래를 정밀 분석해드릴게요! 👶✨",
   guide:["밝은 곳에서 아기 얼굴 정면 큼직하게","자고 있을 때 또는 평온한 순간 추천"], tag:"#흐릿이"},
  {id:23, label:"여러 명 (MULTI)", name:'👶👶 "누구를 볼까요?" 쌍둥이 소동', quote:"아기가 여러 명이에요!",
   detail:"여러 명이 함께 있어서 어느 아기를 분석해드려야 할지 헷갈려요! 다둥이 부모님이라면 한 명씩 따로 사진 올려서 각자의 매력 분석받으세요. 큼직하게 한 명 정면 사진으로 다시 올려주세요 👶",
   guide:["한 명만 크게","얼굴이 화면 절반 이상"], tag:"#쌍둥이소동"},
  {id:24, label:"어른 (ADULT)", name:'🧑 "아기가 아니잖아요!" 어른이', quote:"이건 아기가 아니라 다 큰 어른이시잖아요! 😂",
   detail:'얼굴에 세월의 흔적이 보이는데? 우리 아기 관상은 만 6세 이하 베이비 전용이에요! 어른 분 관상은 "내 관상보기"로 가시면 정밀 분석해드려요. 우리 아기 얼굴 정면 사진으로 다시 올려주세요 🍼',
   guide:["만 6세 이하 아기 얼굴",'어른은 "내 관상보기"에서!'], tag:"#어른이"},
  {id:25, label:"얼굴 가림 (MASKED)", name:'🙈 "얼굴이 숨었어요!" 숨바꼭질', quote:"아기 얼굴이 잘 안 보여요!",
   detail:"턱받이·모자·마스크로 얼굴이 가려져서 천기 AI가 이목구비를 찾다가 포기했어요 ㅋㅋ 아기 얼굴이 이마부터 턱까지 훤히 보이는 정면 사진으로 다시 올려주세요! 👶",
   guide:["모자·턱받이로 가린 부분 없게","얼굴 전체 다 보이게"], tag:"#숨바꼭질"},
  {id:26, label:"일러스트 (ILLUSTRATION)", name:'🎨 "그림 속 아기" 만화왕', quote:"실제 아기 사진을 올려주세요!",
   detail:"와 이 캐릭터 너무 귀엽긴 한데... 천기 도사님은 진짜 우리 아기의 매력만 봐줄 수 있어요! 만화·일러스트·AI 합성 X. 진짜 우리 아기 사진으로 다시 올려주세요 📸",
   guide:["실제 아기 사진 (그림·일러스트 X)","AI 생성·합성 사진도 X"], tag:"#만화왕"},
];
const root = document.getElementById('root');
ERRORS.forEach(e => {
  root.insertAdjacentHTML('beforeend', `
    <div class="item">
      <div class="item-label">━━ ${e.id}. ${e.label} ━━</div>
      <div class="card">
        <div class="brand">${BRAND}</div>
        <div class="err-banner">
          <div class="err-title">⚠️ ERROR!! ERROR!!</div>
          <div class="err-sub">사진을 인식 할 수 없습니다.</div>
        </div>
        <div class="illust"><img src="/baby-cards/baby (${e.id}).png?v=2" alt=""></div>
        <div class="body">
          <div class="char-name">${e.name}</div>
          <div class="char-quote">"${e.quote}"</div>
          <div class="char-detail">${e.detail}</div>
        </div>
        <div class="guide">
          <div class="guide-title">📸 사진 다시 올리기 가이드</div>
          ${e.guide.map(g => `<div class="guide-row">• ${g}</div>`).join('')}
          <div class="guide-row ok">✓ 결제 완료 — 추가 결제 없이 재시도 가능</div>
          <div class="guide-row warn">⚠️ 화면을 나가면 다시 올릴 수 없습니다</div>
        </div>
        <div class="hashtags">
          <span>${HASHTAGS_BASE} ${e.tag}</span>
          <span>🌐 천기.kr</span>
        </div>
      </div>
      <div class="actions">
        <button class="btn-primary">📸 사진 다시 올리기</button>
        <button class="btn-ghost">닫기</button>
      </div>
    </div>
  `);
});
</script>
</body>
</html>
