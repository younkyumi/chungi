<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>천기 수비학 설명 팝업</title>
    <style>
        /* 기본 배경 및 폰트 설정 */
        body {
            background-color: #050505;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Apple SD Gothic Neo', 'Pretendard', sans-serif;
        }

        /* 팝업 전체 컨테이너 */
        .astrology-popup {
            width: 320px;
            background: #0d0d0d; /* 결과지의 어두운 배경색 */
            border: 1px solid #3a0000; /* 미세한 핏빛 테두리 */
            border-radius: 16px;
            padding: 24px;
            text-align: center;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.15); /* 은은한 레드 글로우 */
            position: relative;
        }

        /* 상단 아이콘/이미지 자리 (수비학 상징) */
        .popup-icon {
            width: 60px;
            height: 60px;
            margin: 0 auto 16px;
            background: radial-gradient(circle, #ff2a2a 0%, transparent 80%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffffff;
            font-size: 24px;
            font-weight: bold;
            box-shadow: 0 0 15px rgba(255, 42, 42, 0.6);
        }

        /* 타이틀 */
        .popup-title {
            color: #ffffff;
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.05em;
        }

        .popup-subtitle {
            color: #888;
            font-size: 0.85rem;
            margin-bottom: 24px;
        }

        /* 설명 문구 영역 */
        .info-list {
            text-align: left;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 24px;
        }

        .info-item {
            display: flex;
            align-items: center;
            color: #ddd;
            font-size: 0.9rem;
            margin-bottom: 12px;
            line-height: 1.4;
        }

        .info-item:last-child { margin-bottom: 0; }

        .info-item span {
            color: #ff3b3b; /* 결과지의 붉은 강조색 */
            font-weight: 600;
            margin-right: 6px;
        }

        /* 하단 버튼 */
        .action-button {
            width: 100%;
            background: linear-gradient(135deg, #1a1a1a 0%, #000 100%);
            color: #ff3b3b;
            border: 1px solid #ff3b3b;
            padding: 14px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .action-button:hover {
            background: #ff3b3b;
            color: #ffffff;
            box-shadow: 0 0 20px rgba(255, 59, 59, 0.4);
        }

        /* 닫기 버튼 (X) */
        .close-x {
            position: absolute;
            top: 15px;
            right: 15px;
            color: #555;
            cursor: pointer;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>

<div class="astrology-popup">
    <div class="close-x">×</div>
    
    <div class="popup-icon">🔢</div>
    
    <div class="popup-title">수비학 분석 안내</div>
    <div class="popup-subtitle">당신의 생년월일에 숨겨진 코드를 해독합니다.</div>

    <div class="info-list">
        <div class="info-item">
            <span>●</span> 내 영혼의 본질과 숨겨진 성격
        </div>
        <div class="info-item">
            <span>●</span> 우주가 부여한 이번 생의 사명
        </div>
        <div class="info-item">
            <span>●</span> 2026년 나를 이끌어줄 운의 주파수
        </div>
        <div class="info-item">
            <span>●</span> 전생의 카르마와 보완할 에너지
        </div>
    </div>

    <button class="action-button">운명의 숫자 확인하기</button>
</div>

</body>
</html>
