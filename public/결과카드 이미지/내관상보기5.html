<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --bg-deep-green: #1A3D1A;
            --point-gold: #C9A74E;
            --point-yellow: #F4E0A0;
            --text-white: #FFFFFF;
        }

        body {
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Noto Serif KR', serif;
        }

        /* 팝업 메인 컨테이너 */
        .upload-screen {
            background-color: var(--bg-deep-green);
            color: white;
            border: 2px solid var(--point-gold);
            border-radius: 24px;
            padding: 40px 30px;
            text-align: center;
            max-width: 420px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.7);
        }

        /* 상단 타이틀 */
        .header-title {
            color: var(--point-gold);
            font-size: 24px;
            font-weight: 900;
            margin-bottom: 5px;
            letter-spacing: -0.5px;
        }
        .header-subtitle {
            font-size: 14px;
            opacity: 0.8;
            margin-bottom: 25px;
        }

        /* [핵심] 정밀 얼굴 스캔 비주얼 영역 */
        .scan-container {
            position: relative;
            width: 100%;
            height: 240px;
            background: rgba(0,0,0,0.5);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid #3A5F3A;
            margin-bottom: 25px;
        }

        /* 가상 얼굴 이미지 (대표 캐릭터 등으로 교체 가능) */
        .target-face {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 150px;
            opacity: 0.5;
            filter: grayscale(100%) brightness(1.2);
        }

        /* 스캔 레이저 라인 */
        .laser-line {
            position: absolute;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--point-gold), transparent);
            box-shadow: 0 0 20px var(--point-gold);
            z-index: 10;
            animation: laserMove 3s infinite ease-in-out;
        }

        /* 얼굴 좌표 분석 포인트 */
        .analysis-point {
            position: absolute;
            width: 6px;
            height: 6px;
            background: var(--point-yellow);
            border-radius: 50%;
            box-shadow: 0 0 12px var(--point-yellow);
            opacity: 0;
            animation: pulsePoint 2s infinite;
        }

        /* 데이터 로그 텍스트 */
        .data-log {
            position: absolute;
            bottom: 12px;
            left: 15px;
            font-family: 'Courier New', monospace;
            font-size: 10px;
            color: #4A7F4A;
            text-align: left;
            line-height: 1.3;
        }

        /* 상세 분석 리스트 */
        .feature-list {
            text-align: left;
            background: rgba(0,0,0,0.2);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 30px;
            border: 1px solid #3A5F3A;
        }

        .feature-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            margin-bottom: 10px;
            color: var(--text-white);
        }

        .feature-item:last-child { margin-bottom: 0; }

        /* 애니메이션 키프레임 */
        @keyframes laserMove {
            0% { top: 0%; opacity: 0; }
            20% { opacity: 1; }
            80% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }

        @keyframes pulsePoint {
            0%, 100% { opacity: 0; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.5); }
        }

        /* 메인 버튼 */
        .btn-upload {
            background: linear-gradient(180deg, #D29C44 0%, #AA7B30 100%);
            width: 100%;
            padding: 20px;
            border: none;
            border-radius: 16px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            transition: transform 0.2s;
        }

        .btn-upload:active { transform: scale(0.98); }

    </style>
</head>
<body>

<div class="upload-screen">
    <div class="header-title">🔮 나의 운명 정밀 진단</div>
    <div class="header-subtitle">천기(天機) AI 알고리즘 심층 판독</div>

    <div class="scan-container">
        <div class="laser-line"></div>
        
        <div class="target-face">
            <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" style="width: 100%; opacity: 0.3;">
        </div>

        <div class="analysis-point" style="top: 35%; left: 40%; animation-delay: 0.5s;"></div>
        <div class="analysis-point" style="top: 35%; left: 60%; animation-delay: 0.8s;"></div>
        <div class="analysis-point" style="top: 55%; left: 50%; animation-delay: 1.2s;"></div>
        <div class="analysis-point" style="top: 75%; left: 50%; animation-delay: 1.5s;"></div>

        <div class="data-log">
            SCANNING_SAMSUNG_AREA... OK<br>
            OGWAN_FEATURE_EXTRACTING [92%]<br>
            DESTINY_MAP_GENERATING...
        </div>
    </div>

    <div class="feature-list">
        <div class="feature-item">✅ <b>삼정(三亭) 분석:</b> 초년·중년·말년운</div>
        <div class="feature-item">✅ <b>오관(五官) 판독:</b> 재물·애정·명예운</div>
        <div class="feature-item">✅ <b>맞춤 비방:</b> 운을 보강하는 현대적 솔루션</div>
    </div>

    <p style="font-size: 12px; color: var(--point-gold); margin-bottom: 20px; line-height: 1.5;">
        "하늘이 감춘 당신의 운명,<br>정밀 스캐닝으로 그 지도를 확인해 보세요."
    </p>

    <button class="btn-upload">
        나의 운명 확인하기 (980원) →
    </button>
</div>

</body>
</html>
