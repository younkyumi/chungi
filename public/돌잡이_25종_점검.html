  .const{color:#1d72b8;font-weight:800;}
</style>
</head>
<body>
<h1>🎲 돌잡이 25종 풀 결과 점검본</h1>
<div class="note">
  <b>📌 샘플 유저 = 규미 · 수(水) 일간</b> 기준으로 25종 결과를 모두 렌더했어. 직접 읽고 오타·어색한 문구 잡아줘.<br>
  <span class="const">파란 글씨</span> = <b>유저 사주(일간·본기·격국·용신) 기반 → 25종 전부 동일</b> (아이템 바뀌어도 안 변함).
  <em>골드 글씨</em> = <b>아이템 고유</b>(분야·직업·헤드라인·십성·양육팁) → 이게 종마다 달라야 의미 있음.<br>
  ⚠️ 성격·건강·양육 4탭 콘텐츠는 일간(수) 기준이라 25종 공통 → 맨 아래 5오행 버전 따로 첨부.
</div>
<table class="sum" id="sumtable"><thead><tr><th>#</th><th>오브젝트</th><th>직업(의미)</th><th>분야(cat)</th><th>십성</th></tr></thead><tbody></tbody></table>
<div class="wrap" id="wrap"></div>

 {e:"👨‍🍳",name:"미쉐린 별",mean:"글로벌 셰프·F&B 사업가 — 미각의 예술",hl:"한국인 최초 미쉐린 3스타 10년 연속 유지! 전 세계 미식가들을 홀리다",cat:"요리·F&B",sipsin:"식신",par:"오감이 발달한 아이예요. 다양한 맛·향·소리·촉감을 풍성하게 경험하게 해주세요."},

  c.className='card';
  c.innerHTML=`
   <div class="top"><div class="big">${i+1}. ${it.e} ${it.name}${it.hidden?' 🔒히든':''}</div><div class="mean"><em>${it.mean}</em></div></div>
   <div class="sect cong"><div class="lbl">🎉 축하 문구</div>${cong}</div>
   <div class="sect"><div class="lbl">📜 물건의 뜻</div>${meaningTxt}</div>
   <div class="sect"><div class="lbl">💪 타고난 강점</div>${strength}</div>
   <div class="cert">
     <div style="font-size:11px;letter-spacing:2px;color:#C0C0C8;">✦ 우리 아기가 잡은 돌상</div>
     <div style="font-size:20px;font-weight:900;margin:6px 0;">"${it.name}"</div>
     <div class="kw">미래 키워드 · <em style="color:#FFD700;">${it.cat}</em></div>
     <div class="hl">📰 ${it.hl}</div>
   </div>
   <div class="saju">
     <div class="lbl" style="color:#7A5C00;">☯️ ${nm}의 사주 키워드</div>
     <span class="kv">일간 ${C(USER.ilgan)}</span>
     <span class="kv">본기 ${C(USER.ilOh+'('+USER.ilHanja+')')}</span>
     <span class="kv">격국 ${C(USER.gyeokguk)}</span>
     <span class="kv">용신 ${C(USER.yongsin)}</span>
     <span class="kv">십성 <em>${it.sipsin}</em></span>
     <div style="margin-top:8px;"><em>${it.sipsin}</em> · <em>${it.cat}</em> 분야에 타고난 기질</div>
   </div>
   <div class="sect"><div class="lbl">🌱 양육 팁 (아이템 고유)</div>${it.par}</div>
  `;
  wrap.appendChild(c);
});
</script>
</body>
</html>
