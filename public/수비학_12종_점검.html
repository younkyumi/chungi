<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔢 수비학 12종 소울넘버 점검본</title>
<style>
  body{font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:#0d1117;margin:0;padding:18px;color:#e0e0e0;}
  h1{text-align:center;color:#D4AF37;margin-bottom:6px;}
  .note{max-width:900px;margin:0 auto 18px;background:#161b22;border-radius:12px;padding:14px 18px;font-size:13px;line-height:1.8;color:#aaa;border:1px solid #30363d;}
  .note b{color:#D4AF37;}
  table.sum{max-width:1100px;margin:0 auto 24px;border-collapse:collapse;background:#161b22;font-size:12px;border:1px solid #30363d;}
  table.sum th,table.sum td{border:1px solid #30363d;padding:6px 10px;text-align:left;}
  table.sum th{background:#1a2332;color:#D4AF37;}
  table.sum tr:nth-child(even){background:#0d1117;}
  .wrap{display:grid;grid-template-columns:repeat(auto-fill,minmax(440px,1fr));gap:16px;max-width:1400px;margin:0 auto;}
  .card{background:#161b22;border-radius:18px;overflow:hidden;border:1px solid #30363d;}
  .top{background:linear-gradient(135deg,#1a2332,#243048);padding:16px 20px;border-bottom:2px solid #D4AF37;}
  .num{font-size:48px;font-weight:900;color:#D4AF37;line-height:1;}
  .soul-name{font-size:13px;color:#fff;font-weight:700;margin-top:6px;}
  .soul-sub{font-size:11px;color:#888;margin-top:3px;}
  .chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:5px;}
  .chip{font-size:10.5px;padding:3px 10px;border-radius:12px;background:#243048;color:#D4AF37;font-weight:700;border:1px solid #D4AF3740;}
  .sect{padding:11px 18px;border-bottom:1px solid #21262d;font-size:12px;line-height:1.75;color:#ccc;}
  .lbl{font-size:9.5px;font-weight:800;color:#D4AF37;letter-spacing:2px;margin-bottom:5px;}
  .info-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:12px 18px;background:#0d1117;}
  .info-box{background:#161b22;border:1px solid #30363d;border-radius:10px;padding:10px;text-align:center;}
  .info-box .ib-label{font-size:9px;color:#888;margin-bottom:4px;}
  .info-box .ib-val{font-size:13px;font-weight:800;color:#D4AF37;}
  .ai-box{background:#243048;border-left:3px solid #D4AF37;padding:10px 14px;border-radius:0 8px 8px 0;font-size:11px;color:#aaa;font-style:italic;margin-top:4px;}
  .master{background:linear-gradient(135deg,#7c3aed,#5b21b6)!important;border-color:#a78bfa!important;}
  .master .lbl,.master .ib-val{color:#e9d5ff!important;}
</style>
</head>
<body>
<h1>🔢 수비학 소울넘버 12종 점검본</h1>
<div class="note">
  <b>📌 점검 포인트</b>: 소울넘버 1~9 + 마스터넘버 11·22·33 (총 12종)<br>
  <b style="color:#a78bfa">보라색 카드</b> = 마스터넘버 (11·22·33) — 특별 취급 여부 확인<br>
  각 카드의 <b>고유 정보(이름·행운석·수호성)</b>는 코드 상수값. AI 생성 섹션은 구조 확인용 샘플로 표시.
</div>
<table class="sum" id="sumtable">
  <thead><tr><th>넘버</th><th>이름</th><th>행운석</th><th>수호성</th><th>타입</th></tr></thead>
  <tbody id="tbody"></tbody>
</table>
<div class="wrap" id="wrap"></div>
<script>
const SOULS=[
  {n:1,name:"세상을 개척하는 불꽃같은 도사",stone:"루비",planet:"태양",color:"#DC2626",master:false},
  {n:2,name:"조화를 엮어내는 달빛의 현자",stone:"문스톤",planet:"달",color:"#2563EB",master:false},
  {n:3,name:"창조의 빛을 뿜는 예술가",stone:"옐로우 사파이어",planet:"목성",color:"#D97706",master:false},
  {n:4,name:"대지를 다지는 건축의 장인",stone:"에메랄드",planet:"천왕성",color:"#059669",master:false},
  {n:5,name:"자유를 노래하는 바람의 여행자",stone:"아쿠아마린",planet:"수성",color:"#0891B2",master:false},
  {n:6,name:"사랑을 퍼뜨리는 치유의 수호자",stone:"로즈쿼츠",planet:"금성",color:"#DB2777",master:false},
  {n:7,name:"우주의 비밀을 푸는 고독한 현자",stone:"아메시스트",planet:"해왕성",color:"#7C3AED",master:false},
  {n:8,name:"부와 권력을 다스리는 제왕",stone:"블루 사파이어",planet:"토성",color:"#1E40AF",master:false},
  {n:9,name:"인류를 품는 위대한 성자",stone:"오팔",planet:"화성",color:"#B91C1C",master:false},
  {n:11,name:"직관으로 세상을 깨우는 영매",stone:"셀레나이트",planet:"달+태양",color:"#6D28D9",master:true},
  {n:22,name:"꿈을 현실로 빚는 마스터 빌더",stone:"라피스라줄리",planet:"천왕성+토성",color:"#5B21B6",master:true},
  {n:33,name:"무한한 사랑을 나누는 영적 스승",stone:"다이아몬드",planet:"목성+금성",color:"#4C1D95",master:true},
];

// AI 생성 섹션 목록 (route.ts OUTPUT 스키마 기반)
const AI_SECTIONS=[
  {key:"quote",label:"🌌 영혼의 첫 인사",desc:"[AI] 소울넘버 본질 통찰 · 6~8줄 시적 내러티브"},
  {key:"trait",label:"✨ 영혼의 결",desc:"[AI] 태생적 특징 · 4~5줄"},
  {key:"personality",label:"🪞 심층 성격 분석",desc:"[AI] 성격 핵심 · 타인에게 어떻게 보이는지 · 4~5줄"},
  {key:"desire",label:"💭 무의식 속 깊은 갈망",desc:"[AI] 숨은 욕구·완벽주의·불안 해설 · 4~5줄"},
  {key:"light",label:"☀️ 빛의 에너지 Awakening",desc:"[AI] 영혼의 긍정 역할 · 3~4줄"},
  {key:"shadow",label:"🌑 그림자 에너지 Karma",desc:"[AI] 조심해야 할 어둠·성장 과제 · 3~4줄"},
  {key:"mission",label:"🎯 우주가 부여한 사명",desc:"[AI] 인생 궁극 사명 · 3~4줄"},
  {key:"pastlife",label:"⏳ 전생의 카르마",desc:"[AI] 전생 직업/경험 · 3~4줄"},
  {key:"youth+prime+elder",label:"🔄 인생 주기 3단계",desc:"[AI] 20~35세 · 35~55세 · 55세 이후"},
  {key:"wealth_flow+wealth_guide",label:"💰 재물선 & 재물 가이드",desc:"[AI] 재물이 오는 경로 + 증식 비밀 · 각 3~4줄"},
  {key:"attract+repel",label:"💞 끌리는 영혼 & 상극 파동",desc:"[AI] 끌리는 소울넘버 N + 상극 M"},
  {key:"soulmate_freq",label:"🌹 소울메이트 주파수",desc:"[AI] 어떤 파트너가 와야 하는지 · 3~4줄"},
  {key:"tarot",label:"🃏 영혼의 타로 & 천재성",desc:"[AI] 수호 타로 카드 + 숨은 천재성"},
  {key:"health+food+space",label:"🌿 건강·음식·공간 가이드",desc:"[AI] 오행 관점 주의 장기 + 음식 + 방위 배치"},
  {key:"months_h1+months_h2",label:"📅 5~12월 월별 주파수",desc:"[AI] 8개 달 각 rate/label/guide"},
  {key:"lucky",label:"🍀 행운 가이드",desc:"[AI] 행운 숫자 4개 · 컬러 · 방향 · 시간 · 루틴"},
  {key:"closing",label:"🔮 천기의 한마디",desc:"[AI] 마무리 메시지 · 1~2줄"},
];

// 요약표
const tb=document.getElementById('tbody');
SOULS.forEach(s=>{
  const tr=document.createElement('tr');
  tr.innerHTML=`
    <td style="font-size:20px;font-weight:900;color:${s.color}">${s.n}</td>
    <td style="color:#ddd">${s.name}</td>
    <td>${s.stone}</td>
    <td>${s.planet}</td>
    <td>${s.master?'<b style="color:#a78bfa">마스터넘버 ✨</b>':'일반'}`;
  tb.appendChild(tr);
});

// 결과 카드
const wrap=document.getElementById('wrap');
SOULS.forEach(s=>{
  const d=document.createElement('div');
  d.className='card';
  if(s.master)d.classList.add('master');
  d.innerHTML=`
    <div class="top">
      <div class="num">${s.n}</div>
      <div class="soul-name">${s.name}</div>
      <div class="soul-sub">${s.master?'✨ 마스터넘버':'소울넘버'} · 행운석: ${s.stone} · 수호성: ${s.planet}</div>
    </div>
    <div class="info-grid">
      <div class="info-box"><div class="ib-label">소울넘버</div><div class="ib-val">${s.n}</div></div>
      <div class="info-box"><div class="ib-label">행운석</div><div class="ib-val" style="font-size:11px">${s.stone}</div></div>
      <div class="info-box"><div class="ib-label">수호성</div><div class="ib-val" style="font-size:11px">${s.planet}</div></div>
    </div>
    ${AI_SECTIONS.map(sec=>`
    <div class="sect">
      <div class="lbl">${sec.label}</div>
      <div class="ai-box">${sec.desc}</div>
    </div>`).join('')}
  `;
  wrap.appendChild(d);
});
</script>
</body>
</html>
