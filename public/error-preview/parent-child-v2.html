  {id:22, label:"흐릿함·어두움 (GHOST_MODE)", name:"👻 전설의 고향상", quote:"👻 부모 사진이 너무 흐려요! 기가 너무 세!",
   detail:'초점 나감 + 흔들림 = AI 서버 기절 삐뽀삐뽀 🚨 부모님 사진인데 미스터리 공포 영화 포스터 바이브야! 사진 초점이 안 맞아서, 부모님과 아이의 천륜 인연도 길을 잃을 지경이야. 밝은 곳에서 정면으로 찍은 "원본" 부모 사진을 다시 올려줘! 📸',

  {id:23, label:"다중 인물 (MULTI)", name:"👥 분신술 장인상", quote:"👥 부모 자리에 사람이 너무 많아!",
   detail:"앗! 부모 사진에 기가 센 분들이 너무 많이 모여 있어서 우리 천기 AI 도사님 동공에 지진이 났어! ㅋㅋㅋ 아빠 한 분이든 엄마 한 분이든, 자녀와 천륜을 보고 싶은 '단 한 명'의 부모님 큼직한 정면 얼굴만 빡! 집중해서 다시 올려줘! 🔍👥",

   guide:["부모 얼굴 가리지 말기","이마부터 턱까지 다 보이게"], tag:"#철벽보안상"},
  {id:26, label:"일러스트·캐릭터 (ILLUSTRATION)", name:"🎨 2차원 종이인간상", quote:"🎨 부모 자리에 그림? (근데 진짜 그림이네)",

function render(rootId, errors, brand, basePath){
  const root = document.getElementById(rootId);
  errors.forEach(e => {
    root.insertAdjacentHTML('beforeend', `
      <div class="item">
        <div class="item-label">━━ ${e.id}. ${e.label} ━━</div>
        <div class="card">
          <div class="brand">${brand}</div>
          <div class="err-banner">
            <div class="err-title">⚠️ ERROR!! ERROR!!</div>
            <div class="err-sub">사진을 인식 할 수 없습니다.</div>
          </div>
          <div class="illust"><img src="${basePath}${e.id}).png?nocache" alt=""></div>
          <div class="body">
            <div class="char-name">${e.name}</div>
            <div class="char-quote">"${e.quote}"</div>
            <div class="char-detail">${e.detail}</div>
          </div>
          <div class="guide">
            <div class="guide-title">📸 사진 다시 올리기 가이드</div>
            ${e.guide.map(g => `<div class="guide-row">• ${g}</div>`).join('')}
            <div class="guide-row ok">✓ 결제 완료 — 추가 결제 없이 재시도 가능</div>
            <div class="guide-row warn">⚠️ 화면을 나가면 다시 올릴 수 없습니다</div>
          </div>
          <div class="hashtags">
            <span>${HASH_BASE} ${e.tag}</span>
            <span>🌐 천기.kr</span>
          </div>
        </div>
        <div class="actions">
          <button class="btn-primary">📸 사진 다시 올리기</button>
          <button class="btn-ghost">닫기</button>
        </div>
      </div>
    `);
  });
}

render('root-child', CHILD_ERRORS, BRAND_CHILD, '/baby-cards/baby (');
render('root-parent', PARENT_ERRORS, BRAND_PARENT, '/gwansang-cards/gwansang (');
</script>
