<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>돌잡이 인증서 25종 미리보기</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #1A3C32;
    color: #fff;
    font-family: 'Pretendard', 'Apple SD Gothic Neo', sans-serif;
    padding: 24px 16px;
    min-height: 100vh;
  }
  .preview-title {
    text-align: center;
    font-size: 22px;
    font-weight: 900;
    color: #D4AF37;
    margin-bottom: 6px;
    letter-spacing: 1px;
  }
  .preview-sub {
    text-align: center;
    font-size: 12px;
    color: #A8C4B8;
    margin-bottom: 28px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(420px, 1fr));
    gap: 24px;
    max-width: 1400px;
    margin: 0 auto;
  }
  .label-tag {
    text-align: center;
    font-size: 11px;
    font-weight: 800;
    color: #D4AF37;
    margin-bottom: 8px;
    letter-spacing: 1.5px;
  }
  .label-tag.hidden-tag { color: #FFC107; }
  .cert-outer {
    background: #fff;
    border-radius: 24px;
    overflow: hidden;
    border: 3px solid transparent;
    background-image:
      linear-gradient(#fff, #fff),
      linear-gradient(135deg, #ff6b6b, #FFB74D, #5FC49E, #74B9FF, #9B8FD4);
    background-origin: border-box;
    background-clip: padding-box, border-box;
    box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
  }
  .cert-outer.hidden {
    box-shadow: 0 4px 20px rgba(212, 175, 55, 0.25);
  }
  .cert-inner {
    background: linear-gradient(135deg, #fff5f5, #fff7ed, #f0fdf4, #eff6ff, #faf5ff);
    padding: 24px 20px;
    text-align: center;
  }
  .top-badge {
    font-size: 9px;
    letter-spacing: 2px;

    margin-bottom: 3px;
    white-space: nowrap;
  }
  .normal .top-badge { color: #7A5C00; }
  .hidden .top-badge { color: #92400e; }
  .top-sub {
    font-size: 9px;
    letter-spacing: 3px;
    margin-bottom: 12px;
  }
  .normal .top-sub { color: #888; }
  .hidden .top-sub { color: #b45309; }
  .illust-wrap {
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 200px;
    position: relative;
  }
  .illust-halo {

    width: 200px;
    height: 200px;
    border-radius: 50%;
  }
  .normal .illust-halo {
    background: radial-gradient(circle, rgba(255, 183, 77, 0.2) 0%, transparent 70%);
  }
  .hidden .illust-halo {
    background: radial-gradient(circle, rgba(212, 175, 55, 0.3) 0%, transparent 70%);
  }
  .illust-emoji {
    position: relative;
    z-index: 1;
    font-size: 130px;
    line-height: 1;
  }
  .name-tag {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    margin-bottom: 3px;
  }
  .normal .name-tag { color: #7A5C00; }
  .hidden .name-tag { color: #92400e; }
  .item-name {
    font-size: 20px;
    font-weight: 800;
    margin-bottom: 4px;
    font-family: 'Noto Serif KR', 'Batang', serif;
    line-height: 1.35;
  }
  .normal .item-name { color: #111827; }
  .hidden .item-name { color: #7c2d12; }
  .item-keyword {
    font-size: 11px;
    font-style: italic;
    margin-bottom: 12px;
  }
  .normal .item-keyword { color: #888; }
  .hidden .item-keyword { color: #b45309; }
  .headline {
    font-size: 11px;
    line-height: 1.75;
    margin-bottom: 12px;
    padding: 0 6px;
    font-weight: 500;
  }
  .normal .headline { color: #374151; }
  .hidden .headline { color: #92400e; }
  .meaning-box {
    background: rgba(255,255,255,0.6);
    border-radius: 10px;
    padding: 8px 10px;
    margin-bottom: 12px;
    font-size: 10px;
    color: #555;
    line-height: 1.6;
    border: 1px dashed rgba(122, 92, 0, 0.2);
  }
  .meaning-box strong { color: #7A5C00; }
  .hashtag-row {
    display: flex;
    gap: 5px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 14px;
  }
  .hashtag {
    font-size: 9px;
    padding: 3px 10px;
    border-radius: 20px;
    font-weight: 700;
    border: 1px solid;
  }
  .normal .hashtag {
    background: rgba(122, 92, 0, 0.08);
    color: #7A5C00;
    border-color: rgba(122, 92, 0, 0.2);
  }
  .hidden .hashtag {
    background: rgba(146, 64, 14, 0.1);
    color: #92400e;
    border-color: rgba(146, 64, 14, 0.25);
  }
  .bottom-serial {
    border-top: 1.5px dashed;
    padding-top: 12px;
  }
  .normal .bottom-serial { border-top-color: rgba(122, 92, 0, 0.25); }
  .hidden .bottom-serial { border-top-color: rgba(180, 83, 9, 0.4); }
  .bottom-serial .text {
    font-size: 9px;
    letter-spacing: 2px;
  }
  .normal .bottom-serial .text { color: #888; }
  .hidden .bottom-serial .text { color: #92400e; }
  .section-title {
    text-align: center;
    font-size: 16px;
    font-weight: 900;
    color: #D4AF37;
    margin: 40px 0 16px;
    letter-spacing: 1px;
  }
  .section-divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(212,175,55,0.4), transparent);
    margin: 28px 0;
  }
  .footnote {
    text-align: center;
    margin-top: 40px;
    font-size: 11px;
    color: #A8C4B8;
    line-height: 1.7;
  }
</style>
</head>
<body>
  <div class="preview-title">🎲 돌잡이 인증서 25종 미리보기 (v573)</div>
  <div class="preview-sub">일반 20종 + 히든 5종 · 무지개 보더 통일 · 영어 부제 통일</div>

  <div class="section-title">📋 일반 20종</div>
  <div class="grid" id="normal-grid"></div>

  <div class="section-divider"></div>

  <div class="section-title">👑 히든 5종 (상위 1%)</div>

  <div class="footnote">

<script>

  {emoji:"🔭",name:"측우기",meaning:"과학자·수학자·발명가 — 노벨상 수상, 세상을 바꿀 인재",headline:"한국인 최초 노벨 과학상 수상! 세상을 바꾼 천재 발명가의 탄생",cat:"학문"},
  {emoji:"🍵",name:"약탕기",meaning:"의사·한의사·간호사 — 훌륭한 의료인",headline:"전 세계가 주목하는 명의(名醫), \"어릴 때 잡은 약탕기가 내 운명\"",cat:"의료"},
  {emoji:"🖌️",name:"붓",meaning:"학자·작가·교수 — 문필로 이름을 날릴 의미",headline:"세기의 베스트셀러 작가 등극, 붓끝으로 전 세계를 홀리다",cat:"학문"},
  {emoji:"⚖️",name:"판사봉",meaning:"판사·검사·변호사 — 정의로운 법조인",headline:"2050년 가장 신뢰받는 대법관, \"흔들리지 않는 정의의 상징\"",cat:"법조"},
  {emoji:"💰",name:"엽전",meaning:"부자·금융인 — 부를 창출하고 경제적 자유",headline:"월스트리트를 뒤흔든 전설의 투자자, 완벽한 경제적 자유를 이루다",cat:"재물"},
  {emoji:"💻",name:"IT 큐브",meaning:"IT 전문가·CEO — 미래를 코딩하는 천재",headline:"실리콘밸리가 주목하는 혁신적 CEO, \"미래를 코딩하는 천재\"",cat:"사업"},
  {emoji:"🛂",name:"여권",meaning:"외교관·통역사 — 외국어 능통, 글로벌 활약",headline:"5개국어 능통한 글로벌 리더, 전 세계를 무대로 활약 중!",cat:"글로벌"},
  {emoji:"📖",name:"책",meaning:"학자·작가·교수 — 학문으로 사람을 이롭게",headline:"인류를 이롭게 한 시대의 석학, 지혜로 세상을 밝히다",cat:"학문"},
  {emoji:"🏹",name:"활&화살",meaning:"경찰·장군·직업군인 — 투철하고 용맹한 무인",headline:"흔들림 없는 용기와 결단력! 국민이 가장 존경하는 제복의 영웅",cat:"법조"},
  {emoji:"🐴",name:"마패",meaning:"대통령·관직·공무원 — 고위 관직 명예",headline:"만인이 우러러보는 청렴한 고위 공직자, 역사에 남을 명예를 쥐다",cat:"공직"},
  {emoji:"🧵",name:"바늘쌈",meaning:"디자이너·요리사 — 다재다능한 손재주",headline:"신의 손을 가진 크리에이터, 전 세계의 트렌드를 주도하다",cat:"예술"},
  {emoji:"🎤",name:"마이크",meaning:"예술인·아나운서·기자 — 좋은 말솜씨",headline:"무대에 서면 180도 돌변! 대중의 마음을 훔치는 최고의 스타",cat:"예술"},
  {emoji:"🧶",name:"명주실",meaning:"무병장수 — 건강하게 오래 살 복",headline:"무병장수의 아이콘, \"스트레스 없이 매일매일이 행복해요!\"",cat:"건강"},
  {emoji:"⚽",name:"공",meaning:"운동선수 — 세계적 스포츠 스타",headline:"세계 신기록 경신! 역사를 새로 쓴 스포츠계의 슈퍼스타",cat:"스포츠"},
  {emoji:"🏆",name:"오스카상",meaning:"영화감독·배우 — 유명한 영화인",headline:"칸과 오스카를 동시에 휩쓸다! 세기를 대표하는 천재 영화인",cat:"예술"},
  {emoji:"▶️",name:"골드버튼",meaning:"메가 크리에이터 — 트렌드를 이끄는 아이콘",headline:"구독자 1억 명 돌파! 전 세계가 열광하는 2050년 최고의 크리에이터",cat:"예술"},
  {emoji:"🚀",name:"우주선",meaning:"우주항공·미래산업 — 인류의 새 무대",headline:"화성 탐사 프로젝트 성공! 인류의 우주 시대를 연 천재 엔지니어",cat:"학문"},
  {emoji:"🎧",name:"헤드셋",meaning:"프로게이머·프로듀서 — 압도적 집중력",headline:"세계 대회 전승 우승 신화! \"저의 피지컬 비결은 돌잡이입니다\"",cat:"스포츠"},
  {emoji:"👨‍🍳",name:"미쉐린 별",meaning:"글로벌 셰프·F&B 사업가 — 미각의 예술",headline:"한국인 최초 미쉐린 3스타 10년 연속 유지! 전 세계 미식가들을 홀리다",cat:"예술"},
];

const HIDDEN_ITEMS = [
  {emoji:"👑",name:"옥새",meaning:"시대를 이끄는 일국의 지도자 — 제왕의 운명",headline:"상위 1% 제왕의 사주! 타임지 선정 '세계를 움직이는 가장 영향력 있는 인물 1위'",cat:"히든"},
  {emoji:"🐸",name:"황금 두꺼비",meaning:"천상의 금전운 — 글로벌 재벌",headline:"포브스 선정 2050년 세계 1위 슈퍼리치! \"돌상에서 황금 두꺼비를 쥐었을 때부터 예견된 일\"",cat:"히든"},
  {emoji:"🌌",name:"천상열차분야지도",meaning:"우주의 섭리를 꿰뚫는 세기의 천재",headline:"인류의 새로운 미래를 열다! 우주의 비밀을 푼 세기의 천재 등장",cat:"히든"},
  {emoji:"🦄",name:"유니콘",meaning:"기업 가치 1조 유니콘 창업자 — 무에서 유 창조",headline:"창업 3년 만에 기업가치 10조 돌파! 세상을 뒤집은 최연소 유니콘 CEO",cat:"히든"},
  {emoji:"🔮",name:"여의주",meaning:"평생 귀인의 도움 — 프리패스 운명",headline:"하는 일마다 대박 행진! \"저축해 둔 전생의 운을 이번 생에 다 쓰는 중\"",cat:"히든"},
];

function splitHeadline(h) {
  const m = h.match(/^([^!]*!)\s*(.+)$/);
  if (m) return [m[1], m[2]];
  const m2 = h.match(/^([^"]+)("?.+"?)$/);
  if (m2 && m2[2] && m2[2].length > 6) return [m2[1].trim(), m2[2].trim()];
  return [h, ""];
}

function renderCert(item, isHidden) {
  const [h1, h2] = splitHeadline(item.headline);
  const cls = isHidden ? "hidden" : "normal";
  const badge = isHidden ? "✦ CHUNGI ORIGINALS · SPECIAL HIDDEN ✦" : "✦ CHUNGI ORIGINALS ✦";
  const sub = isHidden ? "— Doljabi Certificate · Special Hidden —" : "— Doljabi Certificate —";
  return `
    <div>
      <div class="label-tag ${isHidden ? 'hidden-tag' : ''}">${item.emoji} ${item.name} · ${item.cat}</div>
      <div class="cert-outer ${cls}">
        <div class="cert-inner ${cls}">
          <div class="top-badge">${badge}</div>
          <div class="top-sub">${sub}</div>
          <div class="illust-wrap">
            <div class="illust-halo"></div>
            <div class="illust-emoji">${item.emoji}</div>
          </div>
          <div class="name-tag">— 👶 김건우의 돌잡이 —</div>
          <div class="item-name">"${item.name}"</div>
          <div class="item-keyword">미래 키워드 · ${item.cat}</div>
          <div class="headline">${h1}${h2 ? '<br>' + h2 : ''}</div>
          <div class="meaning-box"><strong>${item.meaning.split(' — ')[0]}</strong>${item.meaning.includes(' — ') ? '<br>' + item.meaning.split(' — ')[1] : ''}</div>
          <div class="hashtag-row">
            <span class="hashtag">#김건우돌잡이</span>
            <span class="hashtag">#${item.name.replace(/\s/g, '')}</span>
            <span class="hashtag">#${item.cat}</span>
          </div>
          <div class="bottom-serial">
            <div class="text">— 천기(天機) · 돌잡이 인증서 · 평생 소장 —</div>
          </div>
        </div>
      </div>
    </div>
  `;
}

document.getElementById('normal-grid').innerHTML = NORMAL_ITEMS.map(it => renderCert(it, false)).join('');
document.getElementById('hidden-grid').innerHTML = HIDDEN_ITEMS.map(it => renderCert(it, true)).join('');
</script>
</body>
</html>
