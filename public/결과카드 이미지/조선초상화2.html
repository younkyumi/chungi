<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <style>
        :root {
            --bg-deep-green: #1A3D1A;
            --point-gold: #C9A74E;
            --text-white: #FFFFFF;
        }

        .joseon-scanner-popup {
            background-color: var(--bg-deep-green);
            color: var(--text-white);
            border: 2px solid var(--point-gold);
            border-radius: 28px;
            padding: 45px 30px;
            text-align: center;
            max-width: 420px;
            font-family: 'Noto Serif KR', serif;
            box-shadow: 0 25px 60px rgba(0,0,0,0.8);
            position: relative;
        }

        .header-tag {
            font-size: 14px;
            color: var(--point-gold);
            letter-spacing: 2px;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .main-title {
            font-size: 26px;
            font-weight: 900;
            line-height: 1.4;
            margin-bottom: 30px;
        }

        /* [Visual] 페이스 스타일 스캔 영역 */
        .portrait-swap-visual {
            position: relative;
            width: 100%;
            height: 260px;
            background: rgba(0,0,0,0.4);
            border: 1px solid #3A5F3A;
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 30px;
        }

        /* 현대인 사진 (Base) */
        .modern-face {
            position: absolute;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 160px; opacity: 0.4; filter: grayscale(1);
        }

        /* 조선 인물화 변신 (Result) */
        .joseon-art {
            position: absolute;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 180px;
            opacity: 0;
            animation: faceStylize 4s infinite ease-in-out;
        }

        /* 붓터치 레이저 라인 */
        .brush-laser {
            position: absolute;
            width: 100%; height: 3px;
            background: linear-gradient(90deg, transparent, var(--point-gold), transparent);
            box-shadow: 0 0 15px var(--point-gold);
            z-index: 10;
            animation: scanMove 4s infinite ease-in-out;
        }

        /* 신분 리스트 */
        .class-badges {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 30px;
        }

        .badge {
            background: rgba(255,255,255,0.1);
            border: 1px solid var(--point-gold);
            padding: 6px 12px;
            border-radius: 12px;
            font-size: 13px;
            color: var(--point-gold);
        }

        /* 하단 액션 버튼 */
        .btn-joseon {
            background: linear-gradient(180deg, #D29C44 0%, #AA7B30 100%);
            color: white;
            width: 100%;
            padding: 22px;
            border: none;
            border-radius: 16px;
            font-size: 18px;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }

        @keyframes faceStylize {
            0%, 20% { opacity: 0; transform: translate(-50%, -50%) scale(0.9); }
            50%, 80% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; }
        }

        @keyframes scanMove {
            0% { top: 0%; }
            100% { top: 100%; }
        }
    </style>
</head>
<body>

<div class="joseon-scanner-popup">
    <div class="header-tag">天機 : 전생 신분 감정</div>
    <h1 class="main-title">내 얼굴이 조선시대<br>인물화로 다시 태어난다</h1>

    <div class="portrait-swap-visual">
        <div class="brush-laser"></div>
        <div class="modern-face">👤</div>
        <img src="joseon_character_sample.png" class="joseon-art" alt="조선캐릭터">
        
        <div style="position: absolute; bottom: 10px; left: 10px; font-size: 9px; color: #4A7F4A; font-family: monospace; text-align: left;">
            EXTRACTING_FACIAL_STRUCTURE...<br>
            MATCHING_JOSEON_PERSONA [22_TYPES]<br>
            APPLYING_HAEHAK_STYLE_PAINTING...
        </div>
    </div>

    <div class="class-badges">
        <span class="badge">👑 왕/왕비</span>
        <span class="badge">⚔️ 무관</span>
        <span class="badge">💰 거상</span>
        <span class="badge">📜 선비</span>
        <span class="badge">🍶 주모</span>
    </div>

    <p style="font-size: 14px; line-height: 1.6; margin-bottom: 25px; color: #C1D1C1;">
        AI 화공이 당신의 얼굴을 분석하여<br>
        **22종의 조선시대 인물** 중 찰떡인 신분으로 그려냅니다.<br>
        전생의 역할과 계급을 지금 바로 확인하세요.
    </p>

    <button class="btn-joseon">
        조선시대 내 모습 확인하기 (380원) →
    </button>
</div>

</body>
</html>
